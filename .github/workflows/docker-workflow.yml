name: Build and Deploy to ECR

on:
  workflow_dispatch:

env:
  AWS_REGION: ${{secrets.AWS_REGION}}
  ECR_REGISTRY: ${{ secrets.ACCOUNT_ID }}.dkr.ecr.us-west-2.amazonaws.com
  IMAGE_NAME: tasky-app

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  snyk-go-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/golang@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=tasky/tasky/go.mod --sarif-file-output=snyk-go-report.sarif
      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-go-report.sarif
          
  build-and-push:
    runs-on: ubuntu-latest
    environment: dev
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/github_oidc_role
        role-session-name: GitHubActions-DockerBuild-Tasky
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Create tasky app file
      run: |
        cd tasky/tasky
        echo "patrick" > wizexercise.txt
    
    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_NAME: ${{ env.IMAGE_NAME }}
      run: |
        cd tasky/tasky
        IMAGE_URI="$ECR_REGISTRY/$IMAGE_NAME:latest"
        docker build -f Dockerfile -t "$IMAGE_URI" .
        docker push "$IMAGE_URI"

    - name: Update kube config
      run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

    - name: Deploy to EKS
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_NAME: ${{ env.IMAGE_NAME }}
        IMAGE_TAG: "latest"
        EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        MONGODB_USERNAME: ${{ secrets.MONGODB_USER }}
        MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
        MONGODB_IP: ${{ secrets.MONGODB_IP }}
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
      run: |
        MONGODB_URI="mongodb://$MONGODB_USERNAME:$MONGODB_PASSWORD@$MONGODB_IP:27017"
        
        kubectl create namespace tasky-ns --dry-run=client -o yaml | kubectl apply -f -
        kubectl create secret generic tasky-app-secrets \
          --from-literal=MONGODB_URI="$MONGODB_URI" \
          --from-literal=SECRET_KEY="$SECRET_KEY" \
          --namespace tasky-ns \
          --dry-run=client -o yaml | kubectl apply -f -

        sed -i.bak "s|DOCKER_IMAGE|$ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG|g" terraform/04-app-deploy/tasky-deployment.yaml
        kubectl apply -f terraform/04-app-deploy/tasky-deployment.yaml

    - name: Verify wiz file present
      run: |
        kubectl wait --for=condition=Ready pod -l app=tasky-app-deployment --namespace tasky-ns --timeout=60s
        kubectl exec deploy/tasky-app-deployment --namespace tasky-ns -- cat /app/wizexercise.txt
